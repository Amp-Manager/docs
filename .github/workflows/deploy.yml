name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.vitepress/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # ✅ FIX: package-lock.json is at repo root (no "docs/" prefix)
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        # ✅ FIX: No "cd docs" — repo root IS the docs folder
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ✅ FIX: Build output is at repo root/.vitepress/dist
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4